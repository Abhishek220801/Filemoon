<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="js/env.js"></script>
  </head>
  <body>
    <div class="bg-gray-200 min-h-screen flex justify-center items-center animate__animated animate__fadeIn">
      <div
        class="p-8 bg-white w-[420px] rounded-xl flex flex-col justify-center items-center gap-8 animate__animated animate__pulse"
      >
        <div class="flex items-center gap-2">
          <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
          <h1 class="text-3xl font-semibold">Filemoon</h1>
        </div>

        <form class="w-full space-y-6" onsubmit="login(event)">
          <div class="space-y-1">
            <label class="text-gray-500 text-[17px] block">Email</label>
            <input
              name="email"  
              class="w-full p-3 rounded border border-gray-300"
              placeholder="email@mail.com"
              required
              type="email"
              value="abhishek@gmail.com"
            />
          </div>

          <div class="space-y-1">
            <label class="text-gray-500 text-[17px] block">Password</label>
            <input
              name="password"
              class="block w-full p-3 rounded border border-gray-300"
              placeholder="********"
              required
              type="password"
              value="Abhi@123"
            />
          </div>

          <button
            class="p-3 rounded bg-violet-600 w-full text-white text-base hover:bg-violet-700"
            type="submit"
          >
            Sign in
          </button>
        </form>

        <div class="flex items-center gap-2">
          <p class="text-gray-500">Don't have an account?</p>
          <a href="/signup" class="text-green-400 font-medium">Signup</a>
        </div>
      </div>
    </div>
    <script src="js/session.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
