<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body>
    <div class="bg-gray-200 min-h-screen flex justify-center items-center animate__animated animate__fadeIn">
      <div
        class="p-8 bg-white w-[420px] rounded-xl flex flex-col justify-center items-center gap-8 animate__animated animate__pulse"
      >
        <div class="flex items-center gap-2">
          <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
          <h1 class="text-3xl font-semibold">Filemoon</h1>
        </div>

        <form class="w-full space-y-6">

            <div class="flex gap-3">
                <div class="space-y-1">
                    <label class="text-gray-500 text-[17px] block">First Name</label>
                    <input
                    name="firstname"
                    class="w-full p-3 rounded border border-gray-300"
                    placeholder="John"
                    required
                    type="text"
                    />
                </div>
                
                <div class="space-y-1">
                    <label class="text-gray-500 text-[17px] block">Last Name</label>
                    <input
                    name="lastname"
                    class="w-full p-3 rounded border border-gray-300"
                    placeholder="Doe"
                    required
                    type="text"
                    />
                </div>
            </div>

          <div>
            <label class="text-gray-500 text-[17px] block">Email</label>
            <input
              name="email"
              class="w-full p-3 rounded border border-gray-300"
              placeholder="email@mail.com"
              required
              type="email"
            />
          </div>

          <div>
            <label class="text-gray-500 text-[17px] block">Password</label>
            <input
              name="password"
              class="block w-full p-3 rounded border border-gray-300"
              placeholder="********"
              required
              type="password"
            />
          </div>

          <button
            class="p-3 rounded bg-violet-600 w-full text-white text-base hover:bg-violet-700"
          >
            Sign Up
          </button>
        </form>

        <div class="flex items-center gap-2">
          <p class="text-gray-500">Already have an account?</p>
          <a href="/" class="text-green-400 font-medium">Signin</a>
        </div>
      </div>
    </div>
  </body>
</html>
