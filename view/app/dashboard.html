<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/dashboard.js"></script>
  </head>
  <body>
    <div class="bg-gray-100 h-screen">
      <aside
        class="h-14 bg-linear-to-r from-cyan-500 to-blue-500 fixed top-0 left-0 h-full overflow-hidden"
        id="sidebar"
        style="width: 250px; transition: 0.3s"
      >
        <div class="flex flex-col items-center overflow-hidden px-10 py-4">
          <img
            src="../images/smiling-young-man-illustration.png"
            class="w-80"
            alt=""
          />
          <h1 class="text-lg font-medium text-white">Abhishek</h1>
          <p class="text-sem text-gray-100">abhishek@gmail.com</p>
        </div>

        <div class="px-6 flex flex-col gap-4">
          <a href="./dashboard.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-apps-line"></i>
              <label>Dashboard</label>
            </button>
          </a>

          <a href="./my-files.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-file-line"></i>
              <label>My Storage</label>
            </button>
          </a>

          <a href="./history.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-history-line"></i>
              <label>History</label>
            </button>
          </a>

          <button
            class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            onclick="logout()"
          >
            <i class="ri-logout-circle-r-line"></i>
            <label>Logout</label>
          </button>
        </div>
      </aside>
      <section id="section" style="margin-left: 250px; transition: 0.3s">
        <nav
          class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
            <h1 class="text-2xl font-semibold">Filemoon</h1>
          </div>
          <div class="space-x-2">
            <button
              title="logout"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
              onclick="logout()"
            >
              <i class="ri-logout-circle-r-line"></i>
            </button>
            <button
              onclick="toggleSidebar()"
              title="menu"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
            >
              <i class="ri-menu-2-line"></i>
            </button>
          </div>
        </nav>

        <div class="p-6 space-y-4">
          <h1 class="text-lg font-medium">Dashboard</h1>
          <div class="grid grid-cols-4 gap-4">
            <div
              class="bg-white overflow-hidden rounded-lg relative shadow hover:shadow-lg h-40 flex flex-col items-center justify-center"
            >
              <h1 class="text-xl font-semibold text-gray-600">Videos</h1>
              <p class="text-4xl font-bold">25609</p>
              <div
                class="w-[100px] h-[100px] rounded-full absolute top-7 -left-4 flex justify-center items-center"
                style="
                  background-image: linear-gradient(
                    to right,
                    #b8cbb8 0%,
                    #b8cbb8 0%,
                    #b465da 0%,
                    #cf6cc9 33%,
                    #ee609c 66%,
                    #ee609c 100%
                  );
                "
              >
                <i class="ri-live-line text-4xl text-white"></i>
              </div>
            </div>

            <div
              class="bg-white overflow-hidden rounded-lg relative shadow hover:shadow-lg h-40 flex flex-col items-center justify-center"
            >
              <h1 class="text-xl font-semibold text-gray-600">Audios</h1>
              <p class="text-4xl font-bold">1602</p>
              <div
                class="w-[100px] h-[100px] rounded-full absolute top-7 -left-4 flex justify-center items-center"
                style="
                  background-image: linear-gradient(
                    to top,
                    #37ecba 0%,
                    #72afd3 100%
                  );
                "
              >
                <i class="ri-music-2-line text-4xl text-white"></i>
              </div>
            </div>

            <div
              class="bg-white overflow-hidden rounded-lg relative shadow hover:shadow-lg h-40 flex flex-col items-center justify-center"
            >
              <h1 class="text-xl font-semibold text-gray-600">PDF</h1>
              <p class="text-4xl font-bold">3908</p>
              <div
                class="w-[100px] h-[100px] rounded-full absolute top-7 -left-4 flex justify-center items-center"
                style="
                  background-image: linear-gradient(
                    to top,
                    #a7a6cb 0%,
                    #8989ba 52%,
                    #8989ba 100%
                  );
                "
              >
                <i class="ri-file-pdf-2-line text-4xl text-white"></i>
              </div>
            </div>

            <div
              class="bg-white overflow-hidden rounded-lg relative shadow hover:shadow-lg h-40 flex flex-col items-center justify-center"
            >
              <h1 class="text-xl font-semibold text-gray-600">Images</h1>
              <p class="text-4xl font-bold">987</p>
              <div
                class="w-[100px] h-[100px] rounded-full absolute top-7 -left-4 flex justify-center items-center"
                style="
                  background-image: linear-gradient(
                    15deg,
                    #13547a 0%,
                    #80d0c7 100%
                  );
                "
              >
                <i class="ri-file-image-line text-4xl text-white"></i>
              </div>
            </div>

            <div
              class="col-span-2 overflow-hidden bg-white rounded-lg relative shadow hover:shadow-lg p-4"
            >
              <h1 class="text-xl font-semibold text-gray-600">Recent Uploads</h1>
            </div>

            <div
              class="col-span-2 overflow-hidden bg-white rounded-lg relative shadow hover:shadow-lg p-4"
            >
              <h1 class="text-xl font-semibold text-gray-600">Recent Uploads</h1>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script src="../js/layout.js"></script>
  </body>
</html>
