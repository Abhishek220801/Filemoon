<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body>
    <div class="bg-gray-100 h-screen">
      <aside
        class="h-14 bg-linear-to-r from-cyan-500 to-blue-500 fixed top-0 left-0 h-full overflow-hidden"
        id="sidebar"
        style="width: 250px; transition: 0.3s"
      >
        <div class="flex flex-col items-center overflow-hidden px-10 py-4">
          <img
            src="../images/smiling-young-man-illustration.png"
            class="w-80"
            alt=""
          />
          <h1 class="text-lg font-medium text-white">Abhishek</h1>
          <p class="text-sem text-gray-100">abhishek@gmail.com</p>
        </div>

        <div class="px-6 flex flex-col gap-4">
          <a href="./dashboard.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-apps-line"></i>
              <label>Dashboard</label>
            </button>
          </a>

          <a href="./my-files.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-file-line"></i>
              <label>My Storage</label>
            </button>
          </a>

          <a href="./history.html">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-history-line"></i>
              <label>History</label>
            </button>
          </a>

          <button
            class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
          >
            <i class="ri-logout-circle-r-line"></i>
            <label>Logout</label>
          </button>
        </div>
      </aside>
      <section id="section" style="margin-left: 250px; transition: 0.3s">
        <nav
          class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
            <h1 class="text-2xl font-semibold">Filemoon</h1>
          </div>
          <div class="space-x-2">
            <button
              title="menu"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
            >
              <i class="ri-logout-circle-r-line"></i>
            </button>
            <button
              onclick="toggleSidebar()"
              title="menu"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
            >
              <i class="ri-menu-2-line"></i>
            </button>
          </div>
        </nav>

        <div class="p-6 space-y-4">
            <div class="flex justify-between">
                <h1 class="text-lg font-medium">History</h1>
            </div>
          <table class="w-full bg-white">
            <tr class="bg-slate-900 text-white text-left">
                <th class="font-medium py-3 pl-6">Filename</th>
                <th class="font-medium">Email</th> 
                <th class="font-medium">Datetime</th>
                <th class="font-medium">Action</th>
            </tr>
            <tr class="text-gray-500  border-b border-gray-200">
                <td class="py-3 pl-6">Introduction to HTML</td>
                <td>sample@gmail.com</td>
                <td>18 March 2026</td>
                <td>
                    <div class="space-x-2">
                        <button title="Delete" class="border border-2 text-white px-2 py-1 bg-rose-400 hover:bg-rose-500 rounded">
                            <i class="ri-delete-bin-4-line"></i>
                        </button>
                    </div>
                </td>
            </tr>
             <tr class="text-gray-500  border-b border-gray-200">
                <td class="py-3 pl-6">Introduction to HTML</td>
                <td>sample@gmail.com</td>
                <td>18 March 2026</td>
                <td>
                    <div class="space-x-2">
                        <button title="Delete" class="border border-2 text-white px-2 py-1 bg-rose-400 hover:bg-rose-500 rounded">
                            <i class="ri-delete-bin-4-line"></i>
                        </button>
                    </div>
                </td>
            </tr>
             <tr class="text-gray-500">
                <td class="py-3 pl-6">Introduction to HTML</td>
                <td>sample@gmail.com</td>
                <td>18 March 2026</td>
                <td>
                    <div class="space-x-2">
                        <button title="Delete" class="border border-2 text-white px-2 py-1 bg-rose-400 hover:bg-rose-500 rounded">
                            <i class="ri-delete-bin-4-line"></i>
                        </button>
                    </div>
                </td>
            </tr>
          </table>
        </div>
      </section>
      <div class="fixed w-1/3 bg-white shadow-lg top-0 h-full p-6 space-y-6" style="right: -33.33%; transition: 0.2s;" id="drawer"> 
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-medium text-gray-600">Adding a new file</h1>
            <button title="close" onclick="toggleDrawer()">
                <i class="ri-close-circle-fill text-lg cursor-pointer hover:text-rose-600"></i>
            </button>
        </div>
        <div class="h-px bg-gray-100 -mx-6"></div>
        <form class="space-y-6">
            <div class="flex flex-col gap-2">
                <label class="text-gray-600 font-medium">Filename</label>
                <input required title="file" class="py-2 px-3 rounded border border-gray-300" placeholder="Enter a file name">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-gray-600 font-medium">Choose a file</label>
                <input type="file" required title="file" class="py-2 px-3 rounded border border-gray-300">
            </div>
            <button class="py-2 px-6 bg-rose-400 hover:bg-rose-500 text-white rounded font-medium" title="upload">Upload Now</button>
        </form>
        <div class="bg-gray-200 h-4">
            <div class="h-full bg-green-500 w-1/2 text-xs text-center text-gray-200">50%</div>
        </div>
      </div>
    </div>
    <script src="../js/layout.js"></script>
    <script src="../js/my-files.js"></script>
  </body>
</html>
