<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>

  </head>
  <body>
    <div class="bg-gray-100 h-screen">
      <aside
        class="h-14 bg-linear-to-r from-cyan-500 to-blue-500 fixed top-0 left-0 h-full overflow-hidden"
        id="sidebar"
        style="width: 250px; transition: 0.3s"
      >
        <div class="flex flex-col items-center overflow-hidden px-10 py-4">
          <img
            src=""
            class="rounded-full object-cover h-[80px] w-[80px]"
            onclick="uploadImage()"
            id="profile-pic"
            alt=""
          />
          <h1 class="text-lg font-medium text-white" id="fullname"></h1>
          <p class="text-sem text-gray-100" id="email"></p>
        </div>

        <div class="px-6 flex flex-col gap-4">
          <a href="/dashboard">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-apps-line"></i>
              <label>Dashboard</label>
            </button>
          </a>

          <a href="/files">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-file-line"></i>
              <label>My Storage</label>
            </button>
          </a>

          <a href="/history">
            <button
              class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            >
              <i class="ri-history-line"></i>
              <label>History</label>
            </button>
          </a>

          <button
            class="w-full py-2 bg-rose-400 text-white rounded-md hover:bg-rose-600"
            onclick="logout()"
          >
            <i class="ri-logout-circle-r-line"></i>
            <label>Logout</label>
          </button>
        </div>
      </aside>
      <section id="section" style="margin-left: 250px; transition: 0.3s">
        <nav
          class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
            <h1 class="text-2xl font-semibold">Filemoon</h1>
          </div>
          <div class="space-x-2">
            <button
              title="menu"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
              onclick="logout()"
            >
              <i class="ri-logout-circle-r-line"></i>
            </button>
            <button
              onclick="toggleSidebar()"
              title="menu"
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
            >
              <i class="ri-menu-2-line"></i>
            </button>
          </div>
        </nav>

        <div class="p-6 space-y-4">
            <div class="flex justify-between">
                <h1 class="text-lg font-medium">History</h1>
            </div>
          <table class="w-full bg-white">
            <thead>
              <tr class="bg-slate-900 text-white text-left">
                  <th class="font-medium py-3 pl-6">Filename</th>
                  <th class="font-medium">Email</th> 
                  <th class="font-medium">Datetime</th>
              </tr>
            </thead>
            <tbody id="history-table"></tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="../js/env.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/files.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/history.js"></script>
  </body>
</html>
